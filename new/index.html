<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Arrivals - Premium Neon</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #0B0F14;
      color: #fff;
    }

    #new-arrivals-wrapper {
      background: linear-gradient(135deg, #0B0F14, #0E1A12);
      padding: 80px 20px;
      position: relative;
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Floating background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.3;
      pointer-events: none;
    }
    .blob-1 {
      width: 400px;
      height: 400px;
      background: rgba(0, 255, 156, 0.15);
      top: -100px;
      left: -100px;
    }
    .blob-2 {
      width: 300px;
      height: 300px;
      background: rgba(0, 201, 123, 0.1);
      bottom: -50px;
      right: -50px;
    }

    #new-arrivals {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      max-width: 1200px;
      width: 100%;
      z-index: 1;
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 255, 150, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: all 0.4s ease;
      cursor: pointer;
      position: relative;
      overflow: visible;
      transform-style: preserve-3d;
    }

    /* Glow effect spread softly behind card on hover */
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0, 255, 156, 0);
      transition: all 0.4s ease;
      z-index: -1;
    }

    .card:hover {
      transform: perspective(1000px) rotateX(20deg) rotateY(-5deg) translateY(-5px);
      border-color: rgba(0, 255, 150, 0.4);
    }
    
    .card:hover::before {
      box-shadow: 0 20px 50px rgba(0, 255, 156, 0.2);
    }

    .image-wrapper {
      width: 100%;
      height: 240px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      transform-style: preserve-3d;
      animation: float 5s ease-in-out infinite;
    }

    .product-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      mix-blend-mode: screen; /* Magic trick: completely hides the black background! */
      transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5));
    }

    /* Staggered floating animations for organic feel */
    .card:nth-child(2) .image-wrapper {
      animation-delay: -1s;
    }
    .card:nth-child(3) .image-wrapper {
      animation-delay: -2s;
    }

    .card:hover .image-wrapper {
      animation-play-state: paused;
    }

    .card:hover .product-image {
      transform: translateZ(80px) scale(1.3) translateY(-40px);
      filter: drop-shadow(0 30px 40px rgba(0, 255, 156, 0.6));
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .title {
      color: #FFFFFF;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .price {
      color: #00FF9C;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .buy-btn {
      background: linear-gradient(90deg, #00FF9C, #00C97B);
      color: #0B0F14;
      font-weight: 600;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 50px;
      transition: all 0.3s ease;
      display: inline-block;
      width: 100%;
      box-shadow: 0 0 0 rgba(0, 255, 156, 0);
    }

    .buy-btn:hover {
      box-shadow: 0 0 20px rgba(0, 255, 156, 0.6);
      transform: scale(1.02);
    }

    /* Responsive Grid */
    @media (max-width: 1024px) {
      #new-arrivals {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      #new-arrivals {
        grid-template-columns: 1fr;
      }
    }
    /* CTA Banner Styles */
    .cta-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 800px;
      margin: 60px auto 0;
      padding: 24px 32px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 255, 150, 0.2);
      border-radius: 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      cursor: pointer;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      text-decoration: none;
      z-index: 2;
    }
    
    .cta-banner::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 156, 0.1), transparent);
      animation: shine 3s infinite;
      transform: skewX(-20deg);
    }

    @keyframes shine {
      0% { left: -100%; }
      20% { left: 200%; }
      100% { left: 200%; }
    }

    .cta-banner:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: rgba(0, 255, 150, 0.6);
      box-shadow: 0 15px 50px rgba(0, 255, 156, 0.2), inset 0 0 20px rgba(0, 255, 156, 0.05);
    }
    
    .cta-icon {
      font-size: 2.5rem;
      margin-right: 24px;
      filter: drop-shadow(0 0 10px rgba(0, 255, 156, 0.6));
    }
    
    .cta-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .cta-title {
      color: #FFFFFF;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    
    .cta-subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.95rem;
      font-weight: 300;
    }

    .cta-arrow {
      color: #00FF9C;
      font-size: 2rem;
      transition: transform 0.3s ease;
    }

    .cta-banner:hover .cta-arrow {
      transform: translateX(10px);
    }
  </style>
</head>
<body>

<div id="new-arrivals-wrapper">
  <!-- Decorative Background elements -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- Main Section -->
  <div id="new-arrivals">
    <div class="card">
      <div class="image-wrapper">
        <img src="images/neon_mountain_bike.png" class="product-image" alt="Mountain Bike" />
      </div>
      <h2 class="title">Mountain Bike</h2>
      <div class="price">$899</div>
      <a href="http://localhost:3000/cycle" target="_blank" class="buy-btn">View Item</a>
    </div>

    <div class="card">
      <div class="image-wrapper">
        <img src="images/neon_gaming_chair.png" class="product-image" alt="Gaming Chair" />
      </div>
      <h2 class="title">Gaming Chair</h2>
      <div class="price">$399</div>
      <a href="http://localhost:3000/chair" target="_blank" class="buy-btn">View Item</a>
    </div>

    <div class="card">
      <div class="image-wrapper">
        <img src="images/neon_iphone_17.png" class="product-image" alt="iPhone 17 Pro Max" />
      </div>
      <h2 class="title">iPhone 17 Pro Max</h2>
      <div class="price">$1,199</div>
      <a href="http://localhost:3000" target="_blank" class="buy-btn">View Item</a>
    </div>
  </div>

  <!-- Attractive CTA Banner below products -->
  <a href="#" class="cta-banner" onclick="event.preventDefault(); alert('Proceeding to premium collections catalog...')">
    <div class="cta-icon">✨</div>
    <div class="cta-text">
      <span class="cta-title">Experience the Future</span>
      <span class="cta-subtitle">Click to explore the complete collection of next-gen gadgets and web3 tech.</span>
    </div>
    <div class="cta-arrow">→</div>
  </a>

</div>

</body>
</html>
